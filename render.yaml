services:
  - type: web
    name: test-v-financing-assistant
    runtime: python
    plan: free
    rootDir: app
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
